# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Beri tahu GitHub untuk masuk dan melakukan build di dalam folder Frontend
      - name: Install Dependencies and Build
        run: npm ci && npm run build
        working-directory: Frontend

      # 2. Beri tahu Firebase Action bahwa file firebase.json ada di dalam folder Frontend
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RSR_KELASHAN }}
          channelId: live
          projectId: rsr-kelashan
          entryPoint: ./Frontend
